# KittyFocus 自动构建工作流
# 混合使用 .NET SDK + MSBuild：
#   - actions/setup-dotnet → dotnet restore（现代 NuGet 工具链）
#   - microsoft/setup-msbuild → msbuild（经典 WPF 项目需 Visual Studio MSBuild 编译 XAML）

name: Build KittyFocus

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 .NET SDK —— 提供 dotnet restore 等现代 CLI 工具
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 安装 Visual Studio MSBuild —— 编译经典 .NET Framework WPF 项目必需
      - name: Setup MSBuild (for WPF XAML compilation)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'

      # 使用 dotnet restore 替代 nuget restore（更现代、更简洁）
      - name: Restore NuGet packages
        run: dotnet restore KittyFocus.csproj

      # msbuild 是编译此类型项目的可靠方式（dotnet build 不兼容非 SDK 风格 WPF 项目）
      - name: Build (${{ matrix.configuration }} / AnyCPU)
        run: |
          msbuild KittyFocus.csproj `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform="AnyCPU" `
            /p:Deterministic=true `
            /m `
            /p:WarningLevel=4 `
            /p:TreatWarningsAsErrors=false `
            /t:Build `
            /verbosity:normal
        shell: pwsh

      - name: Verify build output
        shell: pwsh
        run: |
          $outputPath = "${{ github.workspace }}\bin\${{ matrix.configuration }}"
          $exePath = Join-Path $outputPath "KittyFocus.exe"

          if (-not (Test-Path $exePath)) {
            Write-Error "编译失败：未找到 KittyFocus.exe"
            exit 1
          }

          $versionInfo = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exePath)
          Write-Host "✓ KittyFocus.exe 编译成功"
          Write-Host "  文件版本: $($versionInfo.FileVersion)"
          Write-Host "  产品版本: $($versionInfo.ProductVersion)"
          Write-Host "  文件大小: $((Get-Item $exePath).Length / 1KB) KB"

      - name: Upload artifacts (${{ matrix.configuration }})
        uses: actions/upload-artifact@v4
        with:
          name: KittyFocus-${{ matrix.configuration }}
          path: |
            bin/${{ matrix.configuration }}/KittyFocus.exe
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [build]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Release build
        uses: actions/download-artifact@v4
        with:
          name: KittyFocus-Release
          path: KittyFocus-Release

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive `
            -Path KittyFocus-Release\* `
            -DestinationPath "KittyFocus-${{ github.ref_name }}.zip" `
            -Force
          Write-Host "✓ 压缩包已创建: KittyFocus-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: KittyFocus-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## KittyFocus ${{ github.ref_name }}

            自动构建于 $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') (UTC)。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
