name: Build KittyFocus

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup MSBuild (via vswhere)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            $vswhere = "${env:ProgramFiles}\Microsoft Visual Studio\Installer\vswhere.exe"
          }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsPath) {
            Write-Error "Visual Studio/MSBuild 未找到"
            exit 1
          }
          $msbuildExe = Join-Path $vsPath "MSBuild\Current\Bin\MSBuild.exe"
          if (-not (Test-Path $msbuildExe)) {
            Write-Error "MSBuild.exe 未在预期路径找到: $msbuildExe"
            exit 1
          }
          Write-Host "Found MSBuild: $msbuildExe"
          $msbuildDir = Split-Path $msbuildExe -Parent
          echo "$msbuildDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # 关键修复：用 nuget.exe 显式指定 packages 目录恢复
      - name: Restore NuGet packages (packages.config)
        shell: pwsh
        run: |
          Write-Host "Downloading nuget.exe..."
          Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile nuget.exe
          Write-Host "Restoring packages..."
          .\nuget.exe restore KittyFocus.csproj -PackagesDirectory .\packages
          Write-Host "Restore completed."

      - name: Build (${{ matrix.configuration }} / AnyCPU)
        run: |
          msbuild KittyFocus.csproj `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform="AnyCPU" `
            /p:Deterministic=true `
            /m `
            /p:WarningLevel=4 `
            /p:TreatWarningsAsErrors=false `
            /t:Build `
            /verbosity:normal
        shell: pwsh

      - name: Verify build output & dependencies
        shell: pwsh
        run: |
          $outputPath = "${{ github.workspace }}\bin\${{ matrix.configuration }}"
          $exePath = Join-Path $outputPath "KittyFocus.exe"

          if (-not (Test-Path $exePath)) {
            Write-Error "编译失败：未找到 KittyFocus.exe"
            exit 1
          }

          $gifDll = Join-Path $outputPath "WpfAnimatedGif.dll"
          if (Test-Path $gifDll) {
            Write-Host "✓ WpfAnimatedGif.dll 已就位"
          } else {
            Write-Warning "⚠ WpfAnimatedGif.dll 未在输出目录找到，请确认 NuGet 包是否正确引用"
          }

          $versionInfo = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exePath)
          Write-Host "✓ KittyFocus.exe 编译成功"
          Write-Host "  文件版本: $($versionInfo.FileVersion)"
          Write-Host "  产品版本: $($versionInfo.ProductVersion)"
          Write-Host "  文件大小: $((Get-Item $exePath).Length / 1KB) KB"

          Get-ChildItem $outputPath -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Upload artifacts (${{ matrix.configuration }})
        uses: actions/upload-artifact@v4
        with:
          name: KittyFocus-${{ matrix.configuration }}
          path: |
            bin/${{ matrix.configuration }}/**/*
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [build]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:               # 添加权限声明
      contents: write
    steps:
      - name: Download Release build
        uses: actions/download-artifact@v4
        with:
          name: KittyFocus-Release
          path: release-files

      - name: Create release archive (with all dependencies)
        shell: pwsh
        run: |
          $exeItem = Get-ChildItem -Path release-files -Recurse -Filter "KittyFocus.exe" | Select-Object -First 1
          if (-not $exeItem) {
            Write-Error "未在 artifact 中找到 KittyFocus.exe"
            exit 1
          }
          $exeDir = $exeItem.DirectoryName
          Write-Host "打包目录: $exeDir"
          Compress-Archive `
            -Path "$exeDir\*" `
            -DestinationPath "KittyFocus-${{ github.ref_name }}.zip" `
            -Force
          Write-Host "✓ 压缩包已创建: KittyFocus-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: KittyFocus-${{ github.ref_name }}.zip
          # generate_release_notes: true    # 注释掉或删除这一行
          body: |
            ## KittyFocus ${{ github.ref_name }}

            自动构建于 $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') (UTC)。
            已包含 WpfAnimatedGif 等运行时依赖，解压即可运行。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
